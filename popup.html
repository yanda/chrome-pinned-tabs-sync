<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <h1>Pinned Tabs Sync</h1>

  <div id="status" class="status">Loading...</div>

  <div id="tabs-section" class="section" style="display:none">
    <h2>Synced Tabs <span id="tab-count" class="badge">0</span></h2>
    <ul id="tab-list"></ul>
  </div>

  <div id="tombstones-section" class="section" style="display:none">
    <h2>Recent Unpins <span id="tombstone-count" class="badge">0</span></h2>
    <ul id="tombstone-list"></ul>
  </div>

  <div class="actions">
    <button id="sync-btn">Sync Now</button>
    <button id="reset-btn" class="danger">Reset</button>
  </div>

  <script src="popup.js"></script>
</body>
</html>
